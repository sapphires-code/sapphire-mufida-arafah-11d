<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Testimoni - Runaway Room Bookstore</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <img src="header3copy.jpg">
</header>
<body>
<header> 
    <nav> 
        <a href="index.html">home</a>
        <a href="product.html">products</a>
        <a href="about-the-books.html">aboutthebooks</a>
        <a href="testimoni.html">testimoni</a>
        <a href="tampil-testimoni.html">tampil testimoni</a>
        <a href="event.html">events</a>
        <a href="kontak.html">contacts</a>
    </nav>
</header>
<h1>Runaway Room Bookstore</h1>

<main class="formulir">
    <h2>give us your review!</h2>
    <form id="form-testimoni">
    <label for="nama">Nama:</label>
    <input type="text" id="nama" name="nama" required placeholder="nama lengkap">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="email@example.com">

    <label for="instansi">Nama sekolah/instansi:</label>
    <input type="text" id="instansi" name="instansi" required placeholder="nama sekolah/instansi">

    <label for="judul">Judul Buku:</label>
    <input type="text" id="judul" name="judul" required placeholder="judul buku">

    <label for="pesan">Your Reviews:</label>
    <textarea id="pesan" name="pesan" required placeholder="tulis pengalaman anda..." rows="5"></textarea>

    <label for="rating">Rating kamu (1-5):</label>
    <input type="number" id="rating" name="rating" min="1" max="5" required placeholder="5">

    <button type="submit">submit your reviews</button>      
</form>

<script>
    const formTestimoni = document.getElementById('form-testimoni');

    formTestimoni.addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const email = document.getElementById('email').value;
        const instansi = document.getElementById('instansi').value;
         const judul = document.getElementById('judul').value;
        const pesan = document.getElementById('pesan').value;
        const rating = document.getElementById('rating').value;

        const dataBaru = { nama, email, instansi, judul, pesan, rating };

        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
        testimoniList.push(dataBaru);
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

        alert('Testimoni berhasil disimpan!');
        window.location.href = 'tampil-testimoni.html';
    });
</script>
</body>

</html>
